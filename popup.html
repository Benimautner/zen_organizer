<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen Tab Organizer</title>
  <style>
    body {
      width: 460px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #141414 0%, #1b1b1b 100%);
      color: #e0e0e0;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
    }
    .rules-container {
      margin-top: 16px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 8px;
    }
    .rule {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px;
      background: #2a2a2a;
      border-radius: 4px;
      align-items: center;
    }
    .rule-pattern {
      flex: 1;
      font-family: monospace;
      font-size: 12px;
      color: #b0b0b0;
    }
    .rule-space {
      padding: 4px 8px;
      background: #3a3a3a;
      border-radius: 2px;
      font-size: 12px;
      min-width: 60px;
      text-align: center;
    }
    .delete-btn {
      background: #d32f2f;
      color: white;
      border: none;
      border-radius: 2px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .delete-btn:hover {
      background: #e53935;
    }
    .add-rule {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .json-panel {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      padding: 8px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #111;
      color: #e0e0e0;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      box-sizing: border-box;
    }
    input, select {
      padding: 6px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #2a2a2a;
      color: #e0e0e0;
      font-size: 12px;
    }
    input::placeholder {
      color: #666;
    }
    button {
      padding: 6px 12px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover {
      background: #1565c0;
    }
    .empty-state {
      text-align: center;
      color: #666;
      padding: 16px 8px;
      font-size: 12px;
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #9bd1ff;
      min-height: 16px;
    }
    .hint {
      font-size: 12px;
      color: #9a9a9a;
      margin: 0;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Zen Tab Organizer</h1>
  <p style="font-size: 12px; color: #999; margin: 8px 0;">
    Define regex patterns to automatically organize tabs into spaces.
  </p>

  <div class="rules-container" id="rulesContainer">
    <div class="empty-state">No rules configured yet</div>
  </div>

  <form class="add-rule" id="addRuleForm">
    <input
      type="text"
      id="patternInput"
      placeholder="Regex pattern (e.g., github\.com|gitlab\.com)"
      style="flex: 1;"
    >
    <input
      type="text"
      id="spaceInput"
      placeholder="Space name"
      style="width: 120px;"
    >
    <button id="addBtn" type="submit">Add</button>
  </form>

  <div class="toolbar">
    <button id="exportBtn" type="button">Export JSON</button>
    <label for="importFile" style="display:inline-flex; align-items:center; gap:8px; cursor:pointer;">
      <span style="padding:6px 12px; background:#2a2a2a; border:1px solid #444; border-radius:4px;">Import JSON File</span>
      <input id="importFile" type="file" accept="application/json,.json" style="display:none;">
    </label>
  </div>

  <div class="json-panel">
    <p class="hint">Paste JSON rules here to import or edit in bulk. Format: <code>[{"pattern":"...","space":"..."}]</code></p>
    <textarea id="jsonInput" placeholder='[{"pattern":"github\\.com","space":"Work"}]'></textarea>
    <div class="toolbar" style="margin-top:0;">
      <button id="importBtn" type="button">Import JSON</button>
      <button id="copyJsonBtn" type="button">Copy JSON</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
